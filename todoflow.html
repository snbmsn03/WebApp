<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TodoFlow">
<meta name="theme-color" id="theme-color-meta" content="#0a0a0f">
<title>TodoFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--surface3:#242430;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#f0f0f8;--muted:rgba(240,240,248,0.45);--muted2:rgba(240,240,248,0.25);
  --accent:#7c6dfa;--accent2:#a693ff;
  --green:#3ecf8e;--amber:#f59e0b;--pink:#f472b6;--blue:#38bdf8;--red:#f87171;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  --radius:16px;--radius-sm:12px;
}
[data-theme="light"]{
  --bg:#f5f5f7;--surface:#ffffff;--surface2:#f0f0f5;--surface3:#e8e8f0;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#0a0a0f;--muted:rgba(10,10,15,0.45);--muted2:rgba(10,10,15,0.25);
  --accent:#6558f5;--accent2:#7c6dfa;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;transition:background 0.2s,color 0.2s}
body{display:flex;flex-direction:column}

/* HEADER */
.header{padding:calc(var(--safe-top) + 14px) 18px 14px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.app-title{font-size:22px;font-weight:500;letter-spacing:-0.5px}
.app-title span{color:var(--accent2)}
.header-right{display:flex;gap:8px;align-items:center}
.icon-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.15s}
.icon-btn:active{background:var(--surface2)}
.stats-row{display:flex;gap:8px}
.stat-pill{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:9px 10px;text-align:center}
.stat-pill .num{font-size:20px;font-weight:500;font-family:'DM Mono',monospace;color:var(--text)}
.stat-pill .lbl{font-size:10px;color:var(--muted);margin-top:1px;letter-spacing:0.3px}
.stat-pill.done .num{color:var(--green)}
.stat-pill.left .num{color:var(--accent2)}

/* SEARCH BAR */
.search-wrap{padding:10px 18px 0;background:var(--bg);flex-shrink:0}
.search-input{width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--accent)}

/* TAG FILTER */
.tag-filter{display:flex;gap:8px;padding:10px 18px 0;overflow-x:auto;flex-shrink:0;background:var(--bg)}
.tag-filter::-webkit-scrollbar{display:none}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;margin-top:10px}
.tab{flex:1;padding:12px;font-size:13px;font-weight:500;color:var(--muted);border:none;background:transparent;cursor:pointer;position:relative;transition:color 0.2s;letter-spacing:0.2px}
.tab.active{color:var(--text)}
.tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--accent);border-radius:2px 2px 0 0}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px calc(80px + var(--safe-bot))}
::-webkit-scrollbar{width:0}

/* SECTION */
.section-label{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:0.6px;text-transform:uppercase;padding:10px 2px 8px;display:flex;align-items:center;justify-content:space-between}
.section-toggle{font-size:11px;color:var(--accent2);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;letter-spacing:0.3px}

/* TASK ITEMS */
.task-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;transition:border-color 0.2s;position:relative;cursor:grab}
.task-item.expanded{border-color:var(--border2)}
.task-item.dragging{opacity:0.5;border-color:var(--accent)}
.task-item.drag-over{border-color:var(--accent2);border-style:dashed}
.swipe-wrapper{position:relative;overflow:hidden;border-radius:var(--radius)}
.swipe-actions{position:absolute;right:0;top:0;bottom:0;display:flex;align-items:center;padding-right:12px;gap:8px;background:transparent}
.swipe-del{background:var(--red);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;opacity:0;transition:opacity 0.2s}
.swipe-edit{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;opacity:0;transition:opacity 0.2s}
.task-inner{background:var(--surface);transition:transform 0.2s;border-radius:var(--radius);position:relative;z-index:1}
.task-row{display:flex;align-items:center;gap:10px;padding:13px 12px}
.drag-handle{color:var(--muted2);font-size:14px;cursor:grab;flex-shrink:0;padding:0 2px;touch-action:none}
.check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;background:transparent}
.check.done{background:var(--green);border-color:var(--green)}
.check.done::after{content:'';display:block;width:6px;height:10px;border:2px solid #0a0a0f;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.task-text{flex:1;font-size:15px;color:var(--text);transition:opacity 0.2s;min-width:0;word-break:break-word}
.task-text.done{opacity:0.35;text-decoration:line-through}
.task-tag{font-size:10px;font-weight:500;padding:3px 8px;border-radius:6px;letter-spacing:0.4px;white-space:nowrap;flex-shrink:0}
.sub-count{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap;flex-shrink:0}
.expand-btn{width:26px;height:26px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* SUBTASKS */
.subtask-area{padding:0 12px 12px 48px;display:flex;flex-direction:column;gap:6px}
.subtask-divider{height:1px;background:var(--border);margin:0 0 8px}
.subtask-row{display:flex;align-items:center;gap:10px}
.sub-check{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.sub-check.done{background:var(--green);border-color:var(--green)}
.sub-check.done::after{content:'';display:block;width:4px;height:7px;border:1.5px solid #0a0a0f;border-top:none;border-left:none;transform:rotate(45deg) translate(-0.5px,-0.5px)}
.sub-text{font-size:13px;color:rgba(240,240,248,0.7);transition:opacity 0.2s;flex:1}
[data-theme="light"] .sub-text{color:rgba(10,10,15,0.6)}
.sub-text.done{opacity:0.3;text-decoration:line-through}
.sub-del{width:18px;height:18px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--muted);font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.add-sub-btn{font-size:12px;color:var(--accent2);background:transparent;border:none;cursor:pointer;padding:4px 0;font-family:'DM Sans',sans-serif;text-align:left}

/* PROJECTS */
.proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.proj-card.sel{border-color:var(--border2)}
.proj-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0}
.proj-card-name{font-size:14px;font-weight:500;margin-bottom:4px;color:var(--text);margin-top:2px}
.proj-card-meta{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.proj-bar-bg{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.proj-bar-fill{height:100%;border-radius:2px;transition:width 0.4s}
.proj-del-btn{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;background:var(--surface3);border:none;cursor:pointer;color:var(--muted);font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s}
.proj-card:hover .proj-del-btn,.proj-card:active .proj-del-btn{opacity:1}
.proj-section-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.proj-section-name{font-size:13px;font-weight:500;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase}

/* FAB */
.fab{position:fixed;bottom:calc(20px + var(--safe-bot));right:18px;width:54px;height:54px;border-radius:17px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(124,109,250,0.4);transition:transform 0.15s;z-index:50}
.fab:active{transform:scale(0.92)}
.fab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal-sheet{width:100%;background:var(--surface2);border-radius:24px 24px 0 0;border:1px solid var(--border2);border-bottom:none;padding:20px 20px calc(20px + var(--safe-bot));transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1)}
.modal-bg.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:17px;font-weight:500;margin-bottom:14px;color:var(--text)}
.modal-input,.modal-select{width:100%;padding:13px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:14px;color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;margin-bottom:10px;outline:none;transition:border-color 0.2s;appearance:none;-webkit-appearance:none}
.modal-input:focus,.modal-select:focus{border-color:var(--accent)}
.color-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.color-dot{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s}
.color-dot.sel{border-color:var(--text);transform:scale(1.15)}
.modal-btn{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity 0.15s}
.modal-btn:active{opacity:0.8}
.modal-label{font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:0.3px}

/* SETTINGS */
.settings-sheet{width:100%;background:var(--surface2);border-radius:24px 24px 0 0;border:1px solid var(--border2);border-bottom:none;padding:20px 20px calc(20px + var(--safe-bot));transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1)}
.modal-bg.open .settings-sheet{transform:translateY(0)}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:15px;color:var(--text)}
.setting-desc{font-size:12px;color:var(--muted);margin-top:2px}
.toggle{width:48px;height:28px;border-radius:14px;background:var(--border2);border:none;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.toggle.on::after{transform:translateX(20px)}
.setting-select{padding:7px 12px;background:var(--surface3);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;appearance:none;-webkit-appearance:none}

.empty{padding:48px 0;text-align:center;color:var(--muted);font-size:14px;line-height:1.8}
.confirm-row{display:flex;gap:8px;margin-top:8px}
.confirm-btn{flex:1;padding:13px;border-radius:14px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text)}
.confirm-btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">Todo<span>Flow</span></div>
    <div class="header-right">
      <button class="icon-btn" id="search-toggle-btn" onclick="toggleSearch()" title="検索">🔍</button>
      <button class="icon-btn" onclick="openSettings()" title="設定">⚙️</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-pill"><div class="num" id="s-total">0</div><div class="lbl">合計</div></div>
    <div class="stat-pill done"><div class="num" id="s-done">0</div><div class="lbl">完了</div></div>
    <div class="stat-pill left"><div class="num" id="s-left">0</div><div class="lbl">残り</div></div>
  </div>
</div>

<div class="search-wrap" id="search-wrap" style="display:none">
  <input class="search-input" id="search-input" placeholder="タスクを検索..." oninput="render()">
</div>

<div class="tag-filter" id="tag-filter">
  <button class="filter-chip active" data-tag="all" onclick="setTagFilter('all')">すべて</button>
  <button class="filter-chip" data-tag="work" onclick="setTagFilter('work')">仕事</button>
  <button class="filter-chip" data-tag="personal" onclick="setTagFilter('personal')">個人</button>
  <button class="filter-chip" data-tag="study" onclick="setTagFilter('study')">学習</button>
  <button class="filter-chip" data-tag="health" onclick="setTagFilter('health')">健康</button>
</div>

<div class="tabs">
  <button class="tab active" id="tab-daily" onclick="switchTab('daily')">今日</button>
  <button class="tab" id="tab-projects" onclick="switchTab('projects')">プロジェクト</button>
</div>

<div class="scroll" id="scroll-area"></div>

<button class="fab" onclick="openModal()">
  <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- TASK/PROJECT MODAL -->
<div class="modal-bg" id="modal-bg" onclick="handleBgClick(event,'modal-bg')">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">タスクを追加</div>
    <input class="modal-input" id="modal-name" placeholder="タスク名...">
    <div id="tag-section">
      <div class="modal-label">タグ</div>
      <select class="modal-select" id="modal-tag">
        <option value="work">仕事</option>
        <option value="personal">個人</option>
        <option value="study">学習</option>
        <option value="health">健康</option>
      </select>
    </div>
    <div id="color-section" style="display:none">
      <div class="modal-label">カラー</div>
      <div class="color-row" id="color-row"></div>
    </div>
    <button class="modal-btn" onclick="saveModal()">保存</button>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-bg" id="settings-bg" onclick="handleBgClick(event,'settings-bg')">
  <div class="settings-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">設定</div>
    <div class="setting-row">
      <div><div class="setting-label">ダークモード</div></div>
      <button class="toggle" id="toggle-dark" onclick="toggleDark()"></button>
    </div>
    <div class="setting-row">
      <div><div class="setting-label">検索バー</div><div class="setting-desc">ヘッダーに検索ボタンを表示</div></div>
      <button class="toggle" id="toggle-search" onclick="toggleSearchSetting()"></button>
    </div>
    <div class="setting-row">
      <div><div class="setting-label">完了タスクの表示</div></div>
      <select class="setting-select" id="done-display" onchange="changeDoneDisplay()">
        <option value="inline">通常表示</option>
        <option value="bottom">下にまとめる</option>
        <option value="hide">非表示</option>
      </select>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-bg" id="confirm-bg" onclick="handleBgClick(event,'confirm-bg')">
  <div class="modal-sheet" id="confirm-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="confirm-title">削除しますか？</div>
    <div style="font-size:14px;color:var(--muted);margin-bottom:16px" id="confirm-desc"></div>
    <div class="confirm-row">
      <button class="confirm-btn" onclick="closeConfirm()">キャンセル</button>
      <button class="confirm-btn danger" id="confirm-ok">削除</button>
    </div>
  </div>
</div>

<script>
const PROJ_COLORS=['#7c6dfa','#3ecf8e','#f472b6','#38bdf8','#f59e0b','#f87171','#e879f9','#22d3ee'];
const TAG_CFG={
  work:{label:'仕事',bg:'rgba(124,109,250,0.18)',text:'#a693ff'},
  personal:{label:'個人',bg:'rgba(62,207,142,0.18)',text:'#3ecf8e'},
  study:{label:'学習',bg:'rgba(245,158,11,0.18)',text:'#fbbf24'},
  health:{label:'健康',bg:'rgba(244,114,182,0.18)',text:'#f472b6'}
};

function loadState(){try{return JSON.parse(localStorage.getItem('tf2_data'))||null}catch(e){return null}}
function saveState(){localStorage.setItem('tf2_data',JSON.stringify(state))}
function loadSettings(){try{return JSON.parse(localStorage.getItem('tf2_settings'))||null}catch(e){return null}}
function saveSettings(){localStorage.setItem('tf2_settings',JSON.stringify(settings))}

let state=loadState()||{
  daily:[
    {id:1,text:'メールチェック',tag:'work',done:false,subtasks:[{text:'返信メール送付',done:false}],expanded:false},
    {id:2,text:'週次レポート作成',tag:'work',done:false,subtasks:[],expanded:false},
    {id:3,text:'運動',tag:'health',done:false,subtasks:[{text:'ストレッチ10分',done:false},{text:'ウォーキング30分',done:false}],expanded:false}
  ],
  projects:[
    {id:101,name:'ウェブリニューアル',color:'#7c6dfa',tasks:[]},
    {id:102,name:'マーケティング',color:'#3ecf8e',tasks:[]}
  ],
  nextId:200
};

let settings=loadSettings()||{dark:true,showSearch:true,doneDisplay:'inline'};
let tab='daily';
let selProj=null;
let modalMode='task';
let modalCtx='daily';
let editingId=null;
let selColor=PROJ_COLORS[0];
let tagFilter='all';
let searchVisible=false;
let dragSrcId=null;
let dragCtx=null;

// Apply settings
function applySettings(){
  document.documentElement.setAttribute('data-theme', settings.dark?'dark':'light');
  document.getElementById('theme-color-meta').content=settings.dark?'#0a0a0f':'#f5f5f7';
  const td=document.getElementById('toggle-dark');
  if(td) td.classList.toggle('on',settings.dark);
  const ts=document.getElementById('toggle-search');
  if(ts) ts.classList.toggle('on',settings.showSearch);
  const dd=document.getElementById('done-display');
  if(dd) dd.value=settings.doneDisplay;
  const sb=document.getElementById('search-toggle-btn');
  if(sb) sb.style.display=settings.showSearch?'':'none';
  if(!settings.showSearch){
    searchVisible=false;
    document.getElementById('search-wrap').style.display='none';
  }
}

function toggleDark(){
  settings.dark=!settings.dark;
  saveSettings();
  applySettings();
}
function toggleSearchSetting(){
  settings.showSearch=!settings.showSearch;
  saveSettings();
  applySettings();
}
function changeDoneDisplay(){
  settings.doneDisplay=document.getElementById('done-display').value;
  saveSettings();
  render();
}
function toggleSearch(){
  if(!settings.showSearch) return;
  searchVisible=!searchVisible;
  document.getElementById('search-wrap').style.display=searchVisible?'block':'none';
  if(searchVisible) setTimeout(()=>document.getElementById('search-input').focus(),100);
  else{document.getElementById('search-input').value='';render();}
}

// Date header
(function(){
  const d=new Date();
  const days=['日','月','火','水','木','金','土'];
})();

function switchTab(t){
  tab=t;
  document.getElementById('tab-daily').classList.toggle('active',t==='daily');
  document.getElementById('tab-projects').classList.toggle('active',t==='projects');
  render();
}

function setTagFilter(tag){
  tagFilter=tag;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.tag===tag));
  render();
}

function getSearchQuery(){return (document.getElementById('search-input')||{value:''}).value.trim().toLowerCase()}

function filterTasks(tasks){
  let list=[...tasks];
  if(tagFilter!=='all') list=list.filter(t=>t.tag===tagFilter);
  const q=getSearchQuery();
  if(q) list=list.filter(t=>t.text.toLowerCase().includes(q));
  return list;
}

function render(){
  if(tab==='daily') renderDaily();
  else renderProjects();
}

function splitDone(tasks){
  if(settings.doneDisplay==='hide') return {active:tasks.filter(t=>!t.done),done:[]};
  if(settings.doneDisplay==='bottom') return {active:tasks.filter(t=>!t.done),done:tasks.filter(t=>t.done)};
  return {active:tasks,done:[]};
}

function renderDaily(){
  const all=state.daily;
  const done=all.filter(t=>t.done).length;
  document.getElementById('s-total').textContent=all.length;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-left').textContent=all.length-done;

  const filtered=filterTasks(all);
  const {active,done:doneList}=splitDone(filtered);
  const el=document.getElementById('scroll-area');

  if(!filtered.length){el.innerHTML='<div class="empty">タスクがありません<br>＋ボタンで追加しましょう</div>';return;}

  let html=active.map(t=>taskHTML(t,'daily')).join('');
  if(doneList.length){
    html+=`<div class="section-label">完了済み <span style="font-size:11px;color:var(--muted2)">${doneList.length}件</span></div>`;
    html+=doneList.map(t=>taskHTML(t,'daily')).join('');
  }
  el.innerHTML=html;
  bindDrag('daily');
  bindSwipe('daily');
}

function renderProjects(){
  const allTasks=state.projects.flatMap(p=>p.tasks);
  const done=allTasks.filter(t=>t.done).length;
  document.getElementById('s-total').textContent=allTasks.length;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-left').textContent=allTasks.length-done;

  let html='<div class="proj-grid">';
  state.projects.forEach(p=>{
    const tot=p.tasks.length,dn=p.tasks.filter(t=>t.done).length;
    const pct=tot?Math.round(dn/tot*100):0;
    html+=`<div class="proj-card${selProj===p.id?' sel':''}" onclick="selProject(${p.id})">
      <div class="proj-accent" style="background:${p.color}"></div>
      <button class="proj-del-btn" onclick="event.stopPropagation();confirmDeleteProject(${p.id})">✕</button>
      <div class="proj-card-name">${p.name}</div>
      <div class="proj-card-meta">${dn}/${tot} 完了</div>
      <div class="proj-bar-bg"><div class="proj-bar-fill" style="width:${pct}%;background:${p.color}"></div></div>
    </div>`;
  });
  html+='</div>';

  if(selProj!==null){
    const p=state.projects.find(x=>x.id===selProj);
    if(p){
      html+=`<div class="proj-section-hdr"><div class="proj-dot" style="background:${p.color}"></div><div class="proj-section-name">${p.name}</div></div>`;
      const filtered=filterTasks(p.tasks);
      const {active,done:doneList}=splitDone(filtered);
      if(!filtered.length) html+='<div class="empty">タスクがありません</div>';
      else{
        html+=active.map(t=>taskHTML(t,'project')).join('');
        if(doneList.length){
          html+=`<div class="section-label">完了済み <span style="font-size:11px;color:var(--muted2)">${doneList.length}件</span></div>`;
          html+=doneList.map(t=>taskHTML(t,'project')).join('');
        }
      }
    }
  }
  document.getElementById('scroll-area').innerHTML=html;
  if(selProj!==null) bindDrag('project');
  bindSwipe('project');
}

function taskHTML(t,ctx){
  const tc=TAG_CFG[t.tag]||TAG_CFG.work;
  const subs=t.subtasks||[];
  const sd=subs.filter(s=>s.done).length;
  let subHTML='';
  if(t.expanded){
    subHTML='<div class="subtask-divider"></div><div class="subtask-area">';
    subs.forEach((s,i)=>{
      subHTML+=`<div class="subtask-row">
        <div class="sub-check${s.done?' done':''}" onclick="toggleSub('${ctx}',${t.id},${i})"></div>
        <span class="sub-text${s.done?' done':''}">${s.text}</span>
        <button class="sub-del" onclick="deleteSub('${ctx}',${t.id},${i})">✕</button>
      </div>`;
    });
    subHTML+=`<button class="add-sub-btn" onclick="addSub('${ctx}',${t.id})">＋ サブタスクを追加</button></div>`;
  }
  const subLabel=subs.length?`<span class="sub-count">${sd}/${subs.length}</span>`:'';
  return `<div class="task-item${t.expanded?' expanded':''}" data-id="${t.id}" data-ctx="${ctx}">
    <div class="swipe-wrapper">
      <div class="swipe-actions">
        <button class="swipe-edit" onclick="openEditModal('${ctx}',${t.id})">編集</button>
        <button class="swipe-del" onclick="deleteTask('${ctx}',${t.id})">削除</button>
      </div>
      <div class="task-inner">
        <div class="task-row">
          <span class="drag-handle" data-id="${t.id}" data-ctx="${ctx}">⠿</span>
          <div class="check${t.done?' done':''}" onclick="toggleTask('${ctx}',${t.id})"></div>
          <span class="task-text${t.done?' done':''}">${t.text}</span>
          ${subLabel}
          <span class="task-tag" style="background:${tc.bg};color:${tc.text}">${tc.label}</span>
          <button class="expand-btn" onclick="toggleExp('${ctx}',${t.id})">${t.expanded?'▲':'▼'}</button>
        </div>
        ${subHTML}
      </div>
    </div>
  </div>`;
}

function getArr(ctx){
  if(ctx==='daily') return state.daily;
  const p=state.projects.find(x=>x.id===selProj);
  return p?p.tasks:[];
}

function toggleTask(ctx,id){
  const t=getArr(ctx).find(x=>x.id===id);
  if(t){t.done=!t.done;saveState();render();}
}
function toggleExp(ctx,id){
  const t=getArr(ctx).find(x=>x.id===id);
  if(t){t.expanded=!t.expanded;saveState();render();}
}
function toggleSub(ctx,tid,si){
  const t=getArr(ctx).find(x=>x.id===tid);
  if(t&&t.subtasks[si]){t.subtasks[si].done=!t.subtasks[si].done;saveState();render();}
}
function addSub(ctx,tid){
  const name=prompt('サブタスク名を入力');
  if(!name) return;
  const t=getArr(ctx).find(x=>x.id===tid);
  if(t){t.subtasks.push({text:name,done:false});t.expanded=true;saveState();render();}
}
function deleteSub(ctx,tid,si){
  const t=getArr(ctx).find(x=>x.id===tid);
  if(t){t.subtasks.splice(si,1);saveState();render();}
}
function deleteTask(ctx,id){
  if(ctx==='daily') state.daily=state.daily.filter(x=>x.id!==id);
  else{const p=state.projects.find(x=>x.id===selProj);if(p)p.tasks=p.tasks.filter(x=>x.id!==id);}
  saveState();render();
}
function selProject(id){
  selProj=(selProj===id)?null:id;
  render();
}

// CONFIRM DELETE PROJECT
function confirmDeleteProject(id){
  const p=state.projects.find(x=>x.id===id);
  if(!p) return;
  document.getElementById('confirm-title').textContent='プロジェクトを削除';
  document.getElementById('confirm-desc').textContent=`「${p.name}」とそのタスクをすべて削除します。`;
  document.getElementById('confirm-ok').onclick=()=>{
    state.projects=state.projects.filter(x=>x.id!==id);
    if(selProj===id) selProj=null;
    saveState();closeConfirm();render();
  };
  document.getElementById('confirm-bg').classList.add('open');
}
function closeConfirm(){document.getElementById('confirm-bg').classList.remove('open');}

// MODAL
function openModal(){
  editingId=null;
  modalCtx=tab;
  modalMode=(tab==='projects'&&selProj===null)?'project':'task';
  document.getElementById('modal-title').textContent=modalMode==='task'?'タスクを追加':'プロジェクトを追加';
  document.getElementById('modal-name').value='';
  document.getElementById('tag-section').style.display=modalMode==='task'?'block':'none';
  document.getElementById('color-section').style.display=modalMode==='project'?'block':'none';
  if(modalMode==='project'){selColor=PROJ_COLORS[0];renderColorPicker();}
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('modal-name').focus(),350);
}
function openEditModal(ctx,id){
  const t=getArr(ctx).find(x=>x.id===id);
  if(!t) return;
  editingId=id;
  modalCtx=ctx;
  modalMode='task';
  document.getElementById('modal-title').textContent='タスクを編集';
  document.getElementById('modal-name').value=t.text;
  document.getElementById('modal-tag').value=t.tag;
  document.getElementById('tag-section').style.display='block';
  document.getElementById('color-section').style.display='none';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('modal-name').focus(),350);
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');editingId=null;}
function openSettings(){document.getElementById('settings-bg').classList.add('open');}
function handleBgClick(e,id){if(e.target===document.getElementById(id))document.getElementById(id).classList.remove('open');}

function renderColorPicker(){
  document.getElementById('color-row').innerHTML=PROJ_COLORS.map(c=>
    `<div class="color-dot${selColor===c?' sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}
function pickColor(c){selColor=c;renderColorPicker();}

function saveModal(){
  const name=document.getElementById('modal-name').value.trim();
  if(!name) return;
  if(modalMode==='task'){
    const tag=document.getElementById('modal-tag').value;
    if(editingId!==null){
      const t=getArr(modalCtx).find(x=>x.id===editingId);
      if(t){t.text=name;t.tag=tag;}
    } else {
      const t={id:state.nextId++,text:name,tag,done:false,subtasks:[],expanded:false};
      if(modalCtx==='daily') state.daily.push(t);
      else if(selProj!==null){const p=state.projects.find(x=>x.id===selProj);if(p)p.tasks.push(t);}
    }
  } else {
    state.projects.push({id:state.nextId++,name,color:selColor,tasks:[]});
  }
  saveState();closeModal();render();
}

// SWIPE TO DELETE
function bindSwipe(ctx){
  document.querySelectorAll(`.task-item[data-ctx="${ctx}"]`).forEach(item=>{
    const inner=item.querySelector('.task-inner');
    const actions=item.querySelector('.swipe-actions');
    const delBtn=item.querySelector('.swipe-del');
    const editBtn=item.querySelector('.swipe-edit');
    let startX=0,curX=0,swiping=false;

    item.addEventListener('touchstart',e=>{
      startX=e.touches[0].clientX;
      curX=startX;
      swiping=true;
    },{passive:true});
    item.addEventListener('touchmove',e=>{
      if(!swiping) return;
      curX=e.touches[0].clientX;
      const dx=Math.min(0,Math.max(-160,curX-startX));
      inner.style.transition='none';
      inner.style.transform=`translateX(${dx}px)`;
      const ratio=Math.min(1,-dx/160);
      delBtn.style.opacity=ratio>0.5?(ratio-0.5)*2:0;
      editBtn.style.opacity=ratio>0.2?(Math.min(ratio,0.5))*2:0;
    },{passive:true});
    item.addEventListener('touchend',()=>{
      if(!swiping) return;
      swiping=false;
      const dx=curX-startX;
      inner.style.transition='transform 0.25s';
      if(dx<-80){
        inner.style.transform='translateX(-140px)';
        delBtn.style.opacity='1';
        editBtn.style.opacity='1';
      } else {
        inner.style.transform='translateX(0)';
        delBtn.style.opacity='0';
        editBtn.style.opacity='0';
      }
    });
  });
}

// DRAG & DROP
function bindDrag(ctx){
  const items=document.querySelectorAll(`.task-item[data-ctx="${ctx}"]`);
  items.forEach(item=>{
    item.setAttribute('draggable','true');
    item.addEventListener('dragstart',e=>{
      dragSrcId=parseInt(item.dataset.id);
      dragCtx=ctx;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    item.addEventListener('dragend',()=>{item.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));});
    item.addEventListener('dragover',e=>{e.preventDefault();item.classList.add('drag-over');});
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{
      e.preventDefault();
      item.classList.remove('drag-over');
      const targetId=parseInt(item.dataset.id);
      if(dragSrcId===targetId) return;
      const arr=getArr(ctx);
      const si=arr.findIndex(x=>x.id===dragSrcId);
      const ti=arr.findIndex(x=>x.id===targetId);
      if(si<0||ti<0) return;
      const [removed]=arr.splice(si,1);
      arr.splice(ti,0,removed);
      saveState();render();
    });
  });

  // Touch drag
  items.forEach(item=>{
    const handle=item.querySelector('.drag-handle');
    if(!handle) return;
    let dragging=false,ghost=null,startY=0,offY=0;
    handle.addEventListener('touchstart',e=>{
      e.stopPropagation();
      dragging=true;
      dragSrcId=parseInt(item.dataset.id);
      dragCtx=ctx;
      startY=e.touches[0].clientY;
      offY=item.getBoundingClientRect().top-startY;
      ghost=item.cloneNode(true);
      ghost.style.cssText=`position:fixed;left:${item.getBoundingClientRect().left}px;width:${item.offsetWidth}px;opacity:0.7;pointer-events:none;z-index:999;top:${e.touches[0].clientY+offY}px;border:1px solid var(--accent);border-radius:16px`;
      document.body.appendChild(ghost);
      item.style.opacity='0.3';
    },{passive:true});
    handle.addEventListener('touchmove',e=>{
      if(!dragging) return;
      const y=e.touches[0].clientY;
      ghost.style.top=(y+offY)+'px';
      const els=document.querySelectorAll(`.task-item[data-ctx="${ctx}"]`);
      els.forEach(el=>{
        const r=el.getBoundingClientRect();
        el.classList.toggle('drag-over',y>r.top&&y<r.bottom&&parseInt(el.dataset.id)!==dragSrcId);
      });
    },{passive:true});
    handle.addEventListener('touchend',e=>{
      if(!dragging) return;
      dragging=false;
      item.style.opacity='';
      if(ghost){ghost.remove();ghost=null;}
      const over=document.querySelector(`.task-item[data-ctx="${ctx}"].drag-over`);
      if(over){
        const targetId=parseInt(over.dataset.id);
        over.classList.remove('drag-over');
        const arr=getArr(ctx);
        const si=arr.findIndex(x=>x.id===dragSrcId);
        const ti=arr.findIndex(x=>x.id===targetId);
        if(si>=0&&ti>=0&&si!==ti){const[r]=arr.splice(si,1);arr.splice(ti,0,r);saveState();}
      }
      render();
    });
  });
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeModal();
    closeConfirm();
    document.getElementById('settings-bg').classList.remove('open');
  }
  if(e.key==='Enter'&&document.getElementById('modal-bg').classList.contains('open')) saveModal();
});

applySettings();
render();
</script>
